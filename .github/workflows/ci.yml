name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install repository hooks
        run: npm run hooks:install

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Check UTF-8 encoding
        run: npm run docs:check-encoding

      - name: Run property-based and unit invariants
        run: npm run test:property